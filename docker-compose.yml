version: "3.9"
services:
  postgres:
    image: postgres:15
    container_name: analytics-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: analytics-redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: analytics-api
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/analytics
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    container_name: analytics-worker
    command: ts-node src/worker/event.processor.ts
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/analytics
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis